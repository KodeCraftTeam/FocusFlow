<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FocusFlow</title>
  <link rel="icon" href="./assets/logo_enfoque.svg">
  <link rel="stylesheet" href="./style.css">
  <script type="module" src="./src/main.js"></script>
</head>

<body>
  <div class="wrap">
    <header>
      <div class="title"><span class="dot"></span>FocusFlow</div>
      <div class="subtitle">Un solo lugar. Una sola cosa a la vez.</div>
    </header>

    <div class="tabs">
      <button class="tab-btn active" data-tab="tasks">tareas</button>
      <button class="tab-btn " data-tab="capture">FocusFlow</button>
      <button class="tab-btn" data-tab="pomodoro">pomodoro</button>
    </div>

    <div class="panel active" id="panel-tasks">
      <div class="input-row">
        <span class="prompt-char">&gt;</span>
        <input type="text" id="taskInput" placeholder="tarea a hacer hoy..." />
      </div>
      <div class="list" id="taskList"></div>
      <footer>
        <span class="count" id="taskCount"></span>
        <button class="clear-btn" id="taskClear">limpiar completadas</button>
        <button class="beep-btn" id="beep">beep</button>
      </footer>
    </div>

    <div class="panel " id="panel-capture">
      <div class="input-row">
        <span class="prompt-char">&gt;</span>
        <input type="text" id="captureInput" placeholder="lo que se te acaba de ocurrir..." />
      </div>
      <div class="list" id="captureList"></div>
      <footer>
        <span class="count" id="captureCount"></span>
        <button class="clear-btn" id="captureClear">limpiar completados</button>
      </footer>
    </div>

    <div class="panel" id="panel-pomodoro">
      <div class="pomo-wrap">
        <div class="pomo-mode focus" id="pomoModeLabel">enfoque</div>
        <div class="pomo-clock" id="pomoClock">25:00</div>
        <div class="pomo-dots" id="pomoDots"></div>
        <div class="pomo-controls">
          <button class="pomo-btn primary" id="pomoToggle">iniciar</button>
          <button class="pomo-btn" id="pomoReset">reiniciar</button>
          <button class="pomo-btn" id="pomoSkip">saltar</button>
        </div>
        <div class="pomo-settings">
          <label>enfoque <input type="number" id="setFocus" min="1" max="90" value="25">m</label>
          <label>descanso corto <input type="number" id="setShort" min="1" max="30" value="5">m</label>
          <label>descanso largo <input type="number" id="setLong" min="1" max="60" value="15">m</label>
        </div>
      </div>
    </div>
  </div>
</body>

</html>
